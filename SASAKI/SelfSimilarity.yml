GSMC_SelfSimilarity:
  version: 1.0
  description: >
    GSMC 各階層（Genesys, Stillness, Motion, Coherence）の間に存在する
    自己相似構造と、スケール（micro / meso / macro）ごとの対応関係を
    定義するファイル。
    しゃしゃき理論における「階層間のフラクタル構造」を明示する。

  scales:
    - name: "micro"
      domain: "短い時系列ウィンドウ（数フレーム〜1動作）"
      description: "単発の動きや局所的な揺らぎにフォーカスするスケール"
    - name: "meso"
      domain: "1フレーズ〜数秒程度のまとまり"
      description: "振付の一部・1バース・短い即興単位"
    - name: "macro"
      domain: "1曲全体・セッション全体・実験全体"
      description: "俯瞰レベルでの構造や流れを扱うスケール"

  # 各スケールにおける「ミニGSMC」
  local_GSMC:
    micro:
      Genesys:
        role: "局所ウィンドウ内の生データを切り出し＆特徴抽出"
        typical_inputs: ["pose_window", "audio_window"]
      Stillness:
        role: "そのウィンドウ内での静けさ・変化量の評価"
      Motion:
        role: "局所パターン（ヒット・アクセント・マイクロリズム）の認識"
      Coherence:
        role: "その一瞬が前後の流れとどれだけ噛み合うかの評価"

    meso:
      Genesys:
        role: "複数ウィンドウを束ねたフレーズ単位のSceneを構成"
      Stillness:
        role: "フレーズ全体のテンションカーブ・静⇔動の切り替え評価"
      Motion:
        role: "振付・クセ・スタイルのまとまりとしてのパターン認識"
      Coherence:
        role: "音楽構造やコンセプトとの整合性評価"

    macro:
      Genesys:
        role: "セッション全体・曲全体のメタ情報・コンテキストの設定"
      Stillness:
        role: "全体としての緊張/弛緩・余白・Stillness戦略の評価"
      Motion:
        role: "全体構成としての動きの展開・構造分類"
      Coherence:
        role: "パフォーマンス/実験全体としての完成度・意味の一貫性"

  # 階層間の「似た役割」の対応表（横方向の自己相似）
  cross_layer_correspondence:
    Genesys:
      similar_to:
        - layer: "Stillness"
          aspect: "基準の設定・座標系の決め方"
        - layer: "Coherence"
          aspect: "全体の前提・文脈の提示"
    Stillness:
      similar_to:
        - layer: "Genesys"
          aspect: "参照フレーム（基底）の構築"
        - layer: "Motion"
          aspect: "動きのモードを決めるパラメータ"
    Motion:
      similar_to:
        - layer: "Coherence"
          aspect: "流れを作る・展開を制御する役割"
    Coherence:
      similar_to:
        - layer: "Genesys"
          aspect: "次のサイクルの初期条件を決める役割"
        - layer: "Stillness"
          aspect: "落ち着き先（収束点）の評価"

  # 「この部分とこの部分は、構造的に同型（っぽい）」という対応マップ
  similarity_maps:
    - name: "MicroStillness_to_MesoGenesys"
      from:
        layer: "Stillness"
        scale: "micro"
      to:
        layer: "Genesys"
        scale: "meso"
      interpretation: >
        microスケールの静けさ分布（どこで動いてどこで止まっているか）は、
        mesoスケール（フレーズ単位）での「どこを1まとまりとして切り出すか」
        を決めるGenesysの役割と自己相似になる。

    - name: "MesoMotion_to_MacroGenesys"
      from:
        layer: "Motion"
        scale: "meso"
      to:
        layer: "Genesys"
        scale: "macro"
      interpretation: >
        mesoスケールでの動きの展開パターンは、
        macroスケールでの「この曲/セッション全体がどういうタイプか」という
        Genesys的なラベリングと構造的に似た役割を果たす。

    - name: "MacroCoherence_to_MicroGenesys"
      from:
        layer: "Coherence"
        scale: "macro"
      to:
        layer: "Genesys"
        scale: "micro"
      interpretation: >
        セッション全体のCoherence評価は、
        次のサイクルでmicroスケールの「初期条件（どこからどう動き始めるか）」
        を決めるGenesysとして再利用される。これによりループ構造が自己相似になる。

  # トポロジーっぽい定義（かなり緩めの使い方）
  topology:
    base_space: "All_GSMC_States"
    points:
      - "SceneState"
      - "SceneState_normalized"
      - "ResponsibilityVector"
      - "StillnessField"
      - "MotionState"
      - "CoherenceScore"
    open_sets:
      - name: "G_neighborhood"
        contains: ["SceneState", "ResponsibilityVector"]
        meaning: "文脈・初期条件の近傍"
      - name: "S_neighborhood"
        contains: ["SceneState_normalized", "StillnessField"]
        meaning: "基準化と静けさの近傍"
      - name: "M_neighborhood"
        contains: ["MotionState"]
        meaning: "動きの意味づけ近傍"
      - name: "C_neighborhood"
        contains: ["CoherenceScore"]
        meaning: "評価・意味の収束近傍"

    continuity:
      maps:
        - name: "scale_projection_micro_to_meso"
          from_scale: "micro"
          to_scale: "meso"
          constraint: "preimage_of_open_set_is_open"
          interpretation: >
            microスケールの変化が、mesoスケールのまとまりを壊さない形で
            抽象化される（“急な断絶”が起きない）ことを要請する。

        - name: "loop_GSMC"
          from: "Coherence"
          to: "Genesys"
          constraint: "composition_over_scales_is_continuous"
          interpretation: >
            Coherenceの結果から次のGenesysへ戻るループが、
            スケールごとに破綻せず滑らかに繋がる（自己相似フラクタル構造）。
