ImprovisationFlow:
  description: >
    ダンス即興における意思決定プロセスを3ステップに抽象化したフロー。
    「選択肢生成 → 選択 → 実行 → 評価」を超高速（〜0.03秒レベル）で回すモデル。
    最大3択まで自然に絞り込まれる脳の構造も含む。

  steps:
    - id: option_generation
      name: "選択肢ある"
      output: "候補は最大3つに自動収束"
      examples:
        - "音が刻んでる → こっちも刻む"
        - "今は起承転結の『承』 → 敢えて離れる"
        - "次の展開が読めん → 一旦ストップを選ぶ"
      notes:
        - "3択に収束するのは認知資源の制約（即興時の高速意思決定）。"
        - "ストップを選ぶには『止まる技術』が前提スキルとして必要。"

    - id: option_selection
      name: "選ぶ"
      criteria:
        - "音との整合性（リズム/フィーリング）"
        - "起承転結のどの位置にいるか"
        - "次の展開の“気配”の予測"
      behavior: >
        この時点で「結果（次の整合性）がどうなるか」までざっくり予測してる。
      output: "1つの行動プランを選択（仮決定）"

    - id: execution
      name: "実行"
      control: "フィーリング優先（気持ちよさベース）"
      behavior:
        - "選んだプランを即実行。"
        - "ここでは『やりたいように』が最優先。"
        - "反射的で身体主導。"
      output: "行動が外部に出る"

    - id: evaluation
      name: "結果と評価"
      latency: "0.03〜0.1秒程度の微評価"
      behavior:
        - "結果自体はあまり考えない（そもそも選ぶ段階で予測済み）。"
        - "次の整合性のためだけに短い“待ち”を入れることがある。"
      output: "整合性チェック → 次の選択肢生成へループ"

  loop:
    type: "cyclic"
    description: >
      全ステップは0.03〜0.2秒単位でループし続ける。
      即興の「流れ」を作る中枢部分。

  requirements:
    skills:
      - "止まる技術（Stop Skill）"
      - "起承転結の感知"
      - "音の刻みの読み取り"
      - "高速なフィードバック統合"
    cognitive_limits:
      max_options: 3
      reason: "即興時のワーキングメモリ容量と選択の最適負荷による制約"

  metadata:
    version: 1.0
    author: "しゃきしゃき"
    model_relation: "GSMCの『Motion→Coherence』ループに相当"
