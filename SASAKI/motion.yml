layer:
  name: "Motion"
  version: 1.0
  role: >
    正規化済みSceneStateとStillnessField、ResponsibilityVectorを入力として、
    MotionState（予測・特徴量・パターン）を出力する層。
    ダンス分類・癖抽出・リズムパターン認識などの「動きの意味づけ」を担う。

inputs:
  from_layers:
    - "Stillness"
    - "Genesys"
  objects:
    required:
      - "SceneState_normalized"
      - "StillnessField"
    optional:
      - "ResponsibilityVector"

outputs:
  objects:
    - "MotionState"
  consumers:
    - "Coherence"

objects_defined:
  MotionState:
    purpose: >
      Motion層が計算した「動きとしての意味・パターン・予測」を保持するオブジェクト。
    fields:
      embeddings:
        type: "ndarray"
        shape: "T, D_emb or D_emb"
        description: "モデルの潜在表現（時系列 or 全体ベクトル）"
      predictions:
        type: "dict"
        description: "クラスラベルと確率（例: ジャンル, 癖, スタイルなど）"
      temporal_patterns:
        type: "dict"
        description: "周期・リズム・位相・反復構造などの指標"
      control_signals:
        type: "dict | null"
        description: "次の動き・演出に使える制御用シグナル（任意）"

models:
  classifier:
    type: "Transformer"
    tasks:
      - "dance_genre"
      - "style_cluster"
      - "habit_class"
    inputs:
      - "SceneState_normalized.pose_seq_norm"
      - "SceneState_normalized.audio_feat_norm"
    outputs:
      - "predictions"
      - "embeddings"

  feature_extractors:
    temporal_patterns:
      description: "時系列的なリズム・周期・遅延構造の抽出"
    joint_velocity:
      description: "関節速度・加速度の統計量"
    rhythm_alignment:
      description: "動きと音のビートとの同期度"

mode_switch:
  based_on: "StillnessField.global_stillness"
  modes:
    precision:
      condition: "global_stillness > 0.7"
      description: "精度重視・計算リソース多め"
      settings:
        time_budget: "high"
        search_space: "narrow"
    reactive:
      condition: "global_stillness <= 0.7"
      description: "反応速度重視・探索広め"
      settings:
        time_budget: "low"
        search_space: "wide"

interfaces:
  consumes:
    from_Stillness:
      objects:
        - "SceneState_normalized"
        - "StillnessField"
    from_Genesys:
      objects:
        - "ResponsibilityVector (optional)"
  provides:
    to_Coherence:
      objects:
        - "MotionState"
      contracts:
        MotionState:
          required_fields:
            - "predictions"
            - "embeddings"
          notes: "これらが無い場合はCoherence評価を制限する"

notes:
  future_extensions:
    - "生成モデル（ダンス生成）との接続"
    - "ResponsibilityVectorを用いたattentionバイアス"

self_similarity:
  local_GSMC_role:
    micro: >
      単発のヒット・アクセント・マイクロリズムなど、
      ごく短い時間スケールでの動きの特徴やパターンを認識する。
    meso: >
      フレーズ単位でのスタイル・クセ・振付構造を捉える。
      反復・展開・コール&レスポンスなど中規模の構造を扱う。
    macro: >
      曲全体・セッション全体レベルでの展開パターンを扱い、
      「どう始まり、どう盛り上がり、どう締めるか」といった構成を記述する。

  corresponds_to:
    - layer: "Coherence"
      via: "流れを作り、時間方向に展開を与える役割という点で近い。"
    - layer: "Genesys"
      via: "macroスケールでは『このダンス/実験はこういうタイプの動き』と定義する点でGenesys的な側面を持つ。"
    - layer: "Stillness"
      via: "Stillnessが決めたテンションカーブに沿って、どこで動きを入れるか/抜くかを調整する制御的役割。"

  similarity_maps_ref:
    - "MesoMotion_to_MacroGenesys"