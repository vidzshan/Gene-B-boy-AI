layer:
  name: "Stillness"
  version: 1.0
  role: >
    Genesys が生成した SceneState と ResponsibilityVector を受け取り、
    正規化された SceneState_normalized と StillnessField を生成する層。
    「静けさ」「基準座標系」「揺らぎ」の定義を担う。

inputs:
  from_layers:
    - "Genesys"
  objects:
    - "SceneState"
    - "ResponsibilityVector"

outputs:
  objects:
    - "SceneState_normalized"
    - "StillnessField"
  consumers:
    - "Motion"
    - "Coherence"

objects_defined:
  SceneState_normalized:
    purpose: >
      座標系・スケール・回転などを正規化した SceneState。
      モデル入力として扱いやすい共通フォーマット。
    based_on: "SceneState"
    invariants:
      - "hip-centered"
      - "scale-normalized"
      - "rotation-neutral (指定時)"
    fields:
      pose_seq_norm:
        type: "ndarray"
        shape: "T, J, D"
        description: "正規化済み骨格列"
      audio_feat_norm:
        type: "ndarray"
        shape: "T, F"
        description: "正規化済み音特徴列"
      timestamps:
        type: "ndarray"
        shape: "T"
      context_tags:
        type: "list[string]"

  StillnessField:
    purpose: >
      時間・関節ごとの静けさと、全体の静けさレベルを表すフィールド。
    fields:
      global_stillness:
        type: "float"
        description: "シーン全体の静けさレベル（0〜1など）"
      per_frame:
        type: "ndarray"
        shape: "T"
        description: "フレームごとの静けさ"
      per_joint:
        type: "ndarray"
        shape: "T, J"
        description: "関節ごとの静けさ"
      reference_state:
        type: "dict"
        description: "基準姿勢・基準音状態など"

processing:
  steps:
    - name: "pose_normalization"
      description: "姿勢座標の基準化（原点・スケール・回転）"
      operations:
        - "hip_centering"
        - "scale_normalization"
        - "rotation_alignment (任意)"
    - name: "audio_normalization"
      description: "音特徴の正規化"
      operations:
        - "volume_normalization"
        - "frequency_normalization"
    - name: "diff_feature_computation"
      description: "変化量ベースの特徴抽出"
      pose:
        metrics:
          - "frame_to_frame_delta"
          - "velocity"
          - "acceleration (拡張候補)"
      audio:
        metrics:
          - "spectral_flux"
    - name: "stillness_metric_computation"
      description: "静けさ指標の計算"
      base_formula: "Stillness = 1 / (sum(|Δpose|) + sum(|Δaudio|) + noise_term)"
      responsibility_weighting:
        enabled: true
        description: "ResponsibilityVectorを用いた重み付け版の計算も許可"

interfaces:
  consumes:
    from_Genesys:
      objects:
        - "SceneState"
        - "ResponsibilityVector"
      contracts:
        SceneState:
          constraints:
            - "timestamps strictly increasing"
            - "関節名・順序は固定"
        ResponsibilityVector:
          constraints:
            - "axes 定義はプロジェクト内で一貫"
  provides:
    to_Motion:
      objects:
        - "SceneState_normalized"
        - "StillnessField"
      contracts:
        SceneState_normalized:
          normalized: true
          invariants:
            - "hip-centered"
            - "scale-invariant"
        StillnessField:
          interpretation: "低値=高モーション, 高値=高スティルネス"
    to_Coherence:
      objects:
        - "StillnessField"

notes:
  future_extensions:
    - "関節ごとのStillnessに周波数域を対応させる"
    - "静けさの空間マップ（2D/3D可視化用）の追加"

self_similarity:
  local_GSMC_role:
    micro: >
      数フレーム〜1動作レベルの局所ウィンドウに対して、
      どれくらい「止まっているか / 揺らいでいるか」を数値化し、
      その瞬間の静けさプロファイルを作る。
    meso: >
      1フレーズ〜数秒レベルで、テンションカーブ・静⇔動の切り替えポイントを抽出する。
      どこが“山”でどこが“間(ま)”かを評価する。
    macro: >
      曲全体・セッション全体としての緊張/弛緩の配分や、
      Stillness戦略（どこを抜くか・どこで溜めるか）を評価する。

  corresponds_to:
    - layer: "Genesys"
      via: "どこを基準として正規化するか(原点/スケール/回転)を決める点で、参照フレーム構築として自己相似。"
    - layer: "Motion"
      via: "Motionのモード(precision / reactiveなど)を切り替える『ゲート』としての役割。"
    - layer: "Coherence"
      via: "最終的な“落ち着き先”や収束点のイメージに近い静けさの評価という側面。"

  similarity_maps_ref:
    - "MicroStillness_to_MesoGenesys"