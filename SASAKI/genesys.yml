layer:
  name: "Genesys"
  version: 1.0
  role: >
    Rawな環境データ（動画・音声・テキストなど）を統合し、
    SceneState と ResponsibilityVector を生成する層。
    しゃしゃき理論における「発生源・文脈の初期条件」に対応。

inputs:
  type: "RawEnv"
  sources:
    video: true
    audio: true
    text: true
    sensors:
      enabled: false
      types: []
  dataset_sources:
    - name: "AIST++"
      type: "dance_video_db"
    - name: "custom_capture"
      type: "user_recorded"

outputs:
  objects:
    - "SceneState"
    - "ResponsibilityVector"
  consumers:
    - "Stillness"
    - "Coherence"

objects_defined:
  SceneState:
    purpose: >
      一定時間区間における「世界の状態」を表すオブジェクト。
      骨格・音・テキスト・時間・文脈タグを統合した基礎表現。
    fields:
      pose_seq:
        type: "ndarray"
        shape: "T, J, D"
        description: "時系列骨格座標列（T:フレーム数, J:関節数, D:2 or 3）"
      audio_feat:
        type: "ndarray"
        shape: "T, F"
        description: "時系列音特徴（例: メルスペクトル）"
      meta_text:
        type: "string | null"
        description: "シーン説明・ラベルなど任意テキスト"
      timestamps:
        type: "ndarray"
        shape: "T"
        description: "各フレームの時刻（単調増加）"
      context_tags:
        type: "list[string]"
        description: "例: ['solo', 'battle', 'lesson'] など"

  ResponsibilityVector:
    purpose: >
      このシーンで「誰・何に責任がどれだけ乗っているか」を表すベクトル。
    fields:
      axes:
        type: "list[string]"
        example: ["self", "other", "system"]
      values:
        type: "ndarray"
        shape: "N"
        description: "各軸に対応する責任の強さ"
      norm:
        type: "float"
        description: "ベクトルの大きさ ||R||"

processing:
  steps:
    - name: "pose_extraction"
      description: "動画から姿勢時系列を取得"
      methods:
        - "MediaPipe"
        - "OpenPose"
        - "SMPL-X (拡張候補)"
    - name: "audio_feature_extraction"
      description: "音声から特徴量を抽出"
      methods:
        - "MelSpectrogram"
        - "BeatDetection"
    - name: "text_metadata_extraction"
      description: "テキストやメタ情報の整形"
      methods:
        - "tokenize"
        - "metadata_parsing"
    - name: "responsibility_assignment"
      description: "責任ベクトルの付与（self/other/systemなど）"
      strategy:
        - "rule_based"
        - "manual_annotation"
        - "learned_model (拡張候補)"

interfaces:
  provides:
    to_Stillness:
      objects:
        - "SceneState"
        - "ResponsibilityVector"
      contracts:
        SceneState:
          type: "time_series"
          shape: "T,J,D"
          constraints:
            - "timestamps strictly increasing"
            - "joint order is固定"
        ResponsibilityVector:
          type: "vector"
          constraints:
            - "axes order is固定 across pipeline"
    to_Coherence:
      objects:
        - "SceneState"
        - "ResponsibilityVector"

notes:
  future_extensions:
    - "センサー値（IMU, mocopi 等）の統合"
    - "責任ベクトルを学習ベースで推定するモジュール"

self_similarity:
  local_GSMC_role:
    micro: >
      短い時系列ウィンドウ（数フレーム〜1動作）に対して、
      その瞬間のSceneState（局所的な世界のスナップショット）を定義する。
    meso: >
      複数のmicroウィンドウを束ね、フレーズ単位・数秒単位のSceneStateを構成する。
      ここで「1まとまりとして扱う単位」を決める。
    macro: >
      曲全体・セッション全体・実験全体のコンテキストSceneStateを定義する。
      パフォーマンス全体の前提・ジャンル・状況設定などをまとめる。

  corresponds_to:
    - layer: "Stillness"
      via: "どこを基準(0点)とみなすかという参照フレームの決め方。基準を決める点で自己相似。"
    - layer: "Coherence"
      via: "評価の前提となる『この世界はこういうもの』という文脈の提示という役割。"
    - layer: "Motion"
      via: "macroスケールでは、動き全体のタイプ(パターン)をラベリングする点で似た役割を持つ。"

  similarity_maps_ref:
    - "MicroStillness_to_MesoGenesys"
    - "MesoMotion_to_MacroGenesys"
    - "MacroCoherence_to_MicroGenesys"